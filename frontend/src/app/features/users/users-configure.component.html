<app-crud-page
  [titleKey]="titleKey"
  [endpoint]="endpoint"
  [fields]="fields"
  [folders]="folders"
  [moduleCode]="moduleCode"
  [createFunctionCode]="createFunctionCode"
  [initialFormModel]="initialFormModel"
  [hideActions]="true"
>
<div class="subcard" style="position: relative; margin-top: 32px; margin-bottom: 18px; padding: 25px 22px 18px 22px; border: 1px solid #d5dfcf; border-radius: 10px; background: #f7faf5;">
  
  <span style="position: absolute; top: -12px; left: 20px; background: #f7faf5; padding: 0 10px; color: #395f31; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">
    Progetti
  </span>
  <div style="display: flex; gap: 40px; align-items: flex-start;">
    
    <div style="flex: 1;">
      <h3 style="margin-top:0; color:#395f31; font-size:1.1rem; font-weight:600; border-bottom: 1px solid #d5dfcf; padding-bottom: 8px; margin-bottom: 12px;">
        Progetti Attivi
      </h3>
      
      <ng-container *ngIf="loadingProjects">Caricamento...</ng-container>
      
      <ul *ngIf="!loadingProjects && projects.length > 0" style="margin:0; padding-left:18px; color:#395f31;">
        <li *ngFor="let p of projects" style="margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; gap: 8px;">
          <span>
            {{ p.descrizione }} <span style="color:#6d9853; font-size:0.95em;">({{ p.code }})</span>
          </span>
          <button *ngIf="!isProjectAssociated(p.id)" (click)="associateProject(p.id)" style="padding:2px 10px; font-size:0.9em; background:#4d78c2; color:#fff; border:none; border-radius:2px; cursor:pointer; min-width: 70px; text-align: right;">Associa</button>
        </li>
      </ul>
      
      <div *ngIf="!loadingProjects && projects.length === 0" style="color:#aaa;">Nessun progetto</div>
    </div>

    <div style="flex: 1;">
      <h3 style="margin-top:0; color:#395f31; font-size:1.1rem; font-weight:600; border-bottom: 1px solid #d5dfcf; padding-bottom: 8px; margin-bottom: 12px;">
        Progetti Associati
      </h3>
      <ng-container *ngIf="loadingAssociated">Caricamento...</ng-container>
      <div *ngIf="errorAssociated" style="color:#c00;">{{ errorAssociated }}</div>
      <ul *ngIf="!loadingAssociated && associatedProjects.length > 0" style="margin:0; padding-left:18px; color:#395f31;">
        <li *ngFor="let p of associatedProjects" style="margin-bottom: 4px;">
          {{ p.descrizione }} <span style="color:#6d9853; font-size:0.95em;">({{ p.code }})</span>
        </li>
      </ul>
      <div *ngIf="!loadingAssociated && associatedProjects.length === 0" style="color:#aaa;">Nessun progetto associato</div>
    </div>

  </div>
</div>
  <div class="subcard" style="margin-bottom: 28px; padding: 18px 22px; border: 1px solid #d5dfcf; border-radius: 10px; background: #f7faf5;">
    <h3 style="margin-top:0; color:#395f31; font-size:1.1rem; font-weight:600;">Ruoli</h3>
    <div style="color:#6d9853;">[Elenco ruoli utente]</div>
  </div>
  <div class="crud-actions" style="display: flex; justify-content: flex-end; margin-top: 32px;">
    <button 
      class="crud-btn crud-btn-secondary"
      type="button"
      (click)="goBack()"
      style="min-width: 150px; background: #4d78c2; color: #fff; box-shadow: 0 8px 18px rgba(77,120,194,0.24); font-weight: 700; border: none; border-radius: 2px; padding: 11px 18px;"
    >
      Annulla
    </button>
  </div>
</app-crud-page>
