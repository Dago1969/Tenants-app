<div class="layout">
  <aside class="sidebar">
    <h1>{{ translate('app.title') }}</h1>
    <p class="selection-info" *ngIf="selectedClient || selectedRole">
      <strong>{{ translate('common.client') }}:</strong> {{ selectedClient || '-' }}<br />
      <strong>{{ translate('common.role') }}:</strong> {{ selectedRole || '-' }}
    </p>
    <nav>
      <a *ngFor="let item of visibleMenuItems" [routerLink]="item.route" routerLinkActive="active">{{ translate(item.labelKey) }}</a>

      <div class="nav-group" *ngIf="isStructureMenuVisible">
        <button class="nav-group-toggle" type="button" (click)="toggleStructuresMenu()">
          <span>{{ translate('menu.structures') }}</span>
          <span class="nav-group-chevron" [class.nav-group-chevron-open]="structuresMenuOpen">v</span>
        </button>

        <div class="nav-group-children" *ngIf="structuresMenuOpen">
          <a
            *ngFor="let item of visibleStructureMenuItems"
            [routerLink]="item.route"
            routerLinkActive="active"
            class="nav-group-link"
          >{{ translate(item.labelKey) }}</a>
        </div>
      </div>
    </nav>
  </aside>

  <main class="content">
    <div style="display:flex;justify-content:flex-end;align-items:center;margin-bottom:16px;">
      <a href="http://localhost:4200/dashboard" target="_blank" style="background:#111827;color:#fff;padding:8px 18px;border-radius:8px;text-decoration:none;font-weight:500;box-shadow:0 2px 8px #0001;">&larr; {{ translate('app.backToDashboard') }}</a>
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
